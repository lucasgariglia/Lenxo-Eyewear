<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Lenxo | Designed for Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            screens: {
              'xl': '700px', // Aggressively lowered to 700px to ensure scaling engine runs on all landscape tablets/laptops/Chromebooks
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #FAFAFA;
        color: #09090B;
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden; /* Prevent horizontal scroll from hero elements */
      }
      .font-serif {
        font-family: 'Playfair Display', serif;
      }
      /* Hide scrollbar for clean luxury feel */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      /* Remove previous cursor:none override to ensure default cursor is always visible */
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.25.0"
  }
}
</script>
</head>

    <div id="root"></div>
  </body>
</html>
